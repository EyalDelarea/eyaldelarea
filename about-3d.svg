<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240">
  <defs>
    <filter id="g" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .orbit { transform-box: fill-box; transform-origin: 120px 130px;
               animation: spin 9s linear infinite; }
      @keyframes spin { from{transform:rotate(0)} to{transform:rotate(360deg)} }
      .float { transform-box: fill-box; transform-origin: center;
               animation: fl ease-in-out infinite; }
      @keyframes fl { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
      .pop { transform-box: fill-box; transform-origin: center bottom;
              animation: pop ease-in-out infinite; }
      @keyframes pop { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
      .tw { animation: tw 2s ease-in-out infinite; }
      @keyframes tw { 0%,100%{opacity:.25} 50%{opacity:1} }
    </style>
  </defs>

  <!-- isometric base plate -->
  <g opacity="0.85" filter="url(#g)">
    <polygon points="120,150 196,194 120,238 44,194" fill="none" stroke="#a855f7" stroke-width="1.5" opacity="0.5"/>
    <polygon points="120,166 168,194 120,222 72,194" fill="none" stroke="#22d3ee" stroke-width="1.2" opacity="0.4"/>
  </g>

  <!-- stacked tower of cubes (builds/deploys) -->
  <g filter="url(#g)">
  <g class="pop" style="animation-delay:0.0s;animation-duration:3.0s">
    <polygon points="90,150 120,165.0 120,187.0 90,172" fill="#0891b2"/>
    <polygon points="120,165.0 150,150 150,172 120,187.0" fill="#0e7490"/>
    <polygon points="120,135.0 150,150 120,165.0 90,150" fill="#5eead4"/>
  </g>
  <g class="pop" style="animation-delay:0.4s;animation-duration:3.0s">
    <polygon points="90,120 120,135.0 120,157.0 90,142" fill="#0891b2"/>
    <polygon points="120,135.0 150,120 150,142 120,157.0" fill="#0e7490"/>
    <polygon points="120,105.0 150,120 120,135.0 90,120" fill="#5eead4"/>
  </g>
  <g class="pop" style="animation-delay:0.8s;animation-duration:3.0s">
    <polygon points="90,90 120,105.0 120,127.0 90,112" fill="#0891b2"/>
    <polygon points="120,105.0 150,90 150,112 120,127.0" fill="#0e7490"/>
    <polygon points="120,75.0 150,90 120,105.0 90,90" fill="#22d3ee"/>
  </g>
  </g>

  <!-- a floating cube above the tower -->
  <g filter="url(#g)">
  <g class="float" style="animation-delay:0.2s;animation-duration:2.6s">
    <polygon points="102,44 120,53.0 120,67.0 102,58" fill="#7c3aed"/>
    <polygon points="120,53.0 138,44 138,58 120,67.0" fill="#6d28d9"/>
    <polygon points="120,35.0 138,44 120,53.0 102,44" fill="#a855f7"/>
  </g>
  </g>

  <!-- orbiting nodes -->
  <g class="orbit">
    <circle class="tw" cx="120" cy="60" r="4" fill="#22d3ee"/>
    <circle class="tw" cx="120" cy="200" r="4" fill="#a855f7" style="animation-delay:.7s"/>
    <circle class="tw" cx="50" cy="130" r="3" fill="#22d3ee" style="animation-delay:1.1s"/>
    <circle class="tw" cx="190" cy="130" r="3" fill="#a855f7" style="animation-delay:1.5s"/>
  </g>
</svg>
